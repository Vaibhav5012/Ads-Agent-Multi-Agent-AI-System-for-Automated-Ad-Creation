# ═══════════════════════════════════
# FILE: docker-compose.yml
# PURPOSE: Docker Compose for CWT Ads Agent with Redis
# ═══════════════════════════════════

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cwt-ads-agent
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
      - ./company_data:/app/company_data
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: cwt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
